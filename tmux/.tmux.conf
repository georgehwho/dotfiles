# Change prefix to Ctrl+a (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support (for resizing panes/scrolling)
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape time (important for vim/neovim users)
set -sg escape-time 10

# True color support (needed for catppuccin in Ghostty)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Easier splits (match Ghostty's Cmd+D / Cmd+Shift+D muscle memory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows open in the current path
bind c new-window -c "#{pane_current_path}"

# Status bar styling (catppuccin-ish)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-right "#[fg=#a6adc8] %H:%M "
set -g window-status-current-format "#[fg=#a6e3a1,bold] #I:#W "
set -g window-status-format "#[fg=#6c7086] #I:#W "
