# Starship prompt config
# Docs: https://starship.rs/config/

# Timeout for commands that starship runs (ms)
command_timeout = 1000

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

[kubernetes]
disabled = false
symbol = "⎈ "
# Only show when kubeconfig is set
detect_files = []
detect_folders = []
detect_env_vars = ["KUBECONFIG"]

[kubernetes.context_aliases]
# Add aliases for your cluster names if they're long, e.g.:
# "arn:aws:eks:us-east-1:123456:cluster/staging" = "staging"

[aws]
disabled = false
symbol = " "
format = '[$symbol($profile )]($style)'

[terraform]
disabled = false
symbol = "󱁢 "

[nodejs]
disabled = false
symbol = " "

[ruby]
disabled = false
symbol = " "

[docker_context]
disabled = true

[package]
disabled = true

# Catppuccin Mocha palette
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
